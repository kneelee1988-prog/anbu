// ── API 호출 (모든 요청은 Edge Function 통해서) ───────────────
async function api(action, params = {}) {
  const res = await fetch(FN_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + ANON_KEY,
      "apikey": ANON_KEY
    },
    body: JSON.stringify({ action, ...params })
  });
  return res.json();
}

// 공지사항만 직접 조회 (RLS에서 anon 허용)
async function getNotices() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/notices?is_active=eq.true&order=created_at.desc`, {
    headers: { apikey: ANON_KEY, Authorization: "Bearer " + ANON_KEY }
  });
  return res.json();
}

// ── 유틸 ──────────────────────────────────────────────────────
const today = () => new Date().toISOString().slice(0, 10);
const now = () => new Date().toISOString();
const fmtDate = (s) => {
  if (!s) return "";
  const d = new Date(s);
  return `${d.getMonth()+1}월 ${d.getDate()}일 ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
};
const getWard = (room) => room || "";
const admitDays = (admittedAt) => {
  if (!admittedAt) return 0;
  const diff = new Date() - new Date(admittedAt);
  return Math.floor(diff / (1000*60*60*24)) + 1;
};

    React.createElement("div", { style: { padding: "60px 24px 24px", textAlign: "center" } },
      React.createElement("div", { style: { fontSize: 28, fontWeight: 900, color: "white", letterSpacing: "-0.5px" } }, "오늘안부"),
      React.createElement("div", { style: { fontSize: 13, color: "rgba(255,255,255,0.6)", marginTop: 4 } }, "천안쌍용요양병원"),
      React.createElement("div", { style: { fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 2 } }, "입원 환자 케어 연결 플랫폼")
    ),
    React.createElement("div", { style: { flex: 1, padding: "0 20px 40px", display: "flex", flexDirection: "column", gap: 10 } },
      roles.map(r => React.createElement("div", {
        key: r.key,
        onClick: () => onSelect(r.key),
        style: { background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 16, padding: "16px 20px", cursor: "pointer", display: "flex", alignItems: "center", gap: 16, transition: "all 0.15s" }
      },
        React.createElement("div", { style: { fontSize: 28, width: 44, height: 44, background: "rgba(255,255,255,0.1)", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center" } }, r.icon),
        React.createElement("div", null,
          React.createElement("div", { style: { fontSize: 16, fontWeight: 700, color: "white" } }, r.title),

        ),

      )),
      React.createElement("div", {

      },

// ── 로그인 화면 ───────────────────────────────────────────────
function LoginScreen({ loginType, onLogin, onBack, onSignup }) {
  const [form, setForm] = useState({ identifier: "", password: "", patientName: "", birthdate: "", phone: "" });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const bgColors = {
    guardian: "linear-gradient(160deg,#1e3a5f,#2563eb)",
    nurse: "linear-gradient(160deg,#064e3b,#059669)",
    doctor: "linear-gradient(160deg,#1e1b4b,#4338ca)",
    messages: "linear-gradient(160deg,#1e3a5f,#0891b2)",
    admin: "linear-gradient(160deg,#1c1917,#44403c)",
  };
  const titles = { guardian: "👨‍👩‍👧 보호자 로그인", nurse: "👩‍⚕️ 간호사 로그인", doctor: "🩺 의사 로그인", messages: "💬 보호자 한마디", admin: "👑 관리자 로그인" };
  const WARDS = ["믿음병동", "소망병동", "사랑병동", "행복병동"];
  const DOCTORS = ["이요성", "김성민", "박지원", "최동훈", "정한솔"];

  const handleLogin = async () => {
    setError(""); setLoading(true);
    try {
      let result;
      if (loginType === "guardian") {
        if (!form.patientName || !form.birthdate || !form.phone) { setError("모든 항목을 입력해주세요."); return; }
        result = await api("guardian_login", { patientName: form.patientName, birthdate: form.birthdate, phone: form.phone });
        if (result.error) { setError(result.error); return; }
        onLogin({ role: "guardian", patient: result.patient, guardianRole: result.guardianRole, phone: form.phone });
      } else {
        const role = loginType === "messages" ? (form.msgRole || "nurse") : loginType;
        const identifier = role === "nurse" ? (form.ward || WARDS[0]) : form.identifier;
        if (!identifier || !form.password) { setError("모든 항목을 입력해주세요."); return; }
        result = await api("staff_login", { identifier, password: form.password, role });
        if (result.error) { setError(result.error); return; }
        onLogin({ ...result.user, loginAs: loginType });
      }
    } catch(e) { setError("오류가 발생했습니다. 다시 시도해주세요."); }
    finally { setLoading(false); }
  };

  return React.createElement("div", { className: "screen", style: { background: bgColors[loginType] || bgColors.guardian } },
    React.createElement("div", { className: "header", style: { paddingTop: 48 } },
      React.createElement("button", { className: "back-btn", onClick: onBack }, "← 역할 선택"),
      React.createElement("div", { style: { fontSize: 24, fontWeight: 800, color: "white", marginTop: 12 } }, titles[loginType]),
      React.createElement("div", { style: { fontSize: 13, color: "rgba(255,255,255,0.6)", marginTop: 4 } }, "오늘안부 · 입원 환자 케어 플랫폼")

    React.createElement("div", { style: { flex: 1, padding: "0 24px 40px" } },
      error && React.createElement("div", { className: "error-msg" }, error),

      // 보호자 로그인
      loginType === "guardian" && React.createElement(React.Fragment, null,

function DoctorScreen({ user, onBack }) {
  const [tab, setTab] = useState("patients");
  const [patients, setPatients] = useState([]);
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    Promise.all([
      api("get_patients", { doctorId: user.doctor_id }),
      api("get_messages", { doctorId: user.doctor_id })
    ]).then(([pd, md]) => {
      setPatients(pd.patients || []);
      setMessages(md.messages || []);
    }).finally(() => setLoading(false));
  }, []);

  const unread = messages.filter(m => !m.is_read).length;

  if (selected) return React.createElement(DoctorReviewScreen, {
    patient: selected, user, onBack: () => setSelected(null)
  });

  const pending = patients.filter(p => !p._reviewed);

  return React.createElement("div", { className: "screen", style: { background: "#f0f4f8" } },
    React.createElement("div", { style: { background: "linear-gradient(135deg,#1e1b4b,#4338ca)", padding: "48px 20px 20px" } },
      React.createElement("div", { className: "header-top" },
        React.createElement("button", { className: "back-btn", onClick: onBack }, "← 역할 선택"),
        React.createElement("button", { className: "logout-btn", onClick: onBack }, "로그아웃 →")
      ),
      React.createElement("div", { style: { fontSize: 11, color: "rgba(255,255,255,0.5)", marginTop: 8 } }, `오늘안부 · 천안쌍용요양병원 · ${user.name} 원장`),
      React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginTop: 4 } },
        React.createElement("div", { style: { fontSize: 18, fontWeight: 800, color: "white" } }, "환자 현황"),

      React.createElement("div", { style: { display: "flex", gap: 8, marginTop: 12 } },
        React.createElement("button", { onClick: () => setTab("patients"), style: { flex: 1, padding: "8px", background: tab==="patients"?"white":"rgba(255,255,255,0.15)", border: "none", borderRadius: 8, color: tab==="patients"?"#1e1b4b":"white", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "'Noto Sans KR',sans-serif" } }, "환자목록"),
        React.createElement("button", { onClick: () => setTab("messages"), style: { flex: 1, padding: "8px", background: tab==="messages"?"white":"rgba(255,255,255,0.15)", border: "none", borderRadius: 8, color: tab==="messages"?"#1e1b4b":"white", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "'Noto Sans KR',sans-serif", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 } },

// ── 메인 앱 ───────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("splash");
  const [role, setRole] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);

  useEffect(() => {
    // 온보딩 확인
    const seen = localStorage.getItem("anbu_onboarded");
    setScreen(seen ? "roleSelect" : "onboarding");
  }, []);

  const handleOnboardDone = () => {
    localStorage.setItem("anbu_onboarded", "1");
    setScreen("roleSelect");
  };

  const handleRoleSelect = (r) => {
    if (r === "notices") { setRole("notices"); setScreen("notices"); return; }
    setRole(r);
    setScreen("login");
  };

  const handleLogin = (user) => {
    setCurrentUser(user);
    setScreen("app");
  };

  const handleLogout = () => {
    setCurrentUser(null);
    setRole(null);
    setScreen("roleSelect");
  };

  if (screen === "splash") return React.createElement("div", { style: { minHeight: "100vh", background: "linear-gradient(160deg,#0f172a,#1e3a5f)", display: "flex", alignItems: "center", justifyContent: "center" } },
    React.createElement("div", { style: { fontSize: 32, fontWeight: 900, color: "white" } }, "오늘안부")
  );

  if (screen === "onboarding") return React.createElement(OnboardingScreen, { onDone: handleOnboardDone });
  if (screen === "notices") return React.createElement(NoticesScreen, { onBack: () => setScreen("roleSelect") });
  if (screen === "roleSelect") return React.createElement(RoleSelectScreen, { onSelect: handleRoleSelect });
  if (screen === "login") return React.createElement(LoginScreen, {
    loginType: role,
    onLogin: handleLogin,
    onBack: () => setScreen("roleSelect"),
    onSignup: () => setScreen("signup")
  });
  if (screen === "signup") return React.createElement(GuardianSignupScreen, {
    onBack: () => setScreen("login"),
    onDone: () => setScreen("login")
  });

  if (screen === "app" && currentUser) {
    if (currentUser.role === "guardian") return React.createElement(GuardianScreen, { user: currentUser, onBack: handleLogout });
    if (currentUser.role === "nurse") return React.createElement(NurseScreen, { user: currentUser, onBack: handleLogout });
    if (currentUser.role === "doctor") return React.createElement(DoctorScreen, { user: currentUser, onBack: handleLogout });
    if (currentUser.loginAs === "messages") return React.createElement(MessagesScreen, { user: currentUser, onBack: handleLogout });
    if (currentUser.role === "admin") return React.createElement(AdminScreen, { user: currentUser, onBack: handleLogout });
  }

  return null;
}
